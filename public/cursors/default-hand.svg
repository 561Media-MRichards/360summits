    <path d="M10 3C10 1.9 10.9 1 12 1C13.1 1 14 1.9 14 3V13H10V3Z" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Middle finger -->
    <path d="M14 2C14 0.9 14.9 0 16 0C17.1 0 18 0.9 18 2V13H14V2Z" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Ring finger -->
    <path d="M18 3C18 1.9 18.9 1 20 1C21.1 1 22 1.9 22 3V13H18V3Z" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Pinky -->
    <path d="M22 5C22 3.9 22.9 3 24 3C25.1 3 26 3.9 26 5V13H22V5Z" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Palm -->
    <path d="M6 15C6 13.34 7.34 12 9 12H24C25.66 12 27 13.34 27 15V21C27 25.42 23.42 29 19 29H14C9.58 29 6 25.42 6 21V15Z" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Thumb -->
    <path d="M6 17C4.34 17 3 15.66 3 14C3 12.34 4.34 11 6 11V17Z" fill="white" stroke="#1A1A1A" stroke-width="1.5"/>
    <!-- Wrist lines -->
    <path d="M11 20H23" stroke="#1A1A1A" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  </g>
  <defs>
    <filter id="shadow" x="0" y="0" width="32" height="36" filterUnits="userSpaceOnUse">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-opacity="0.15"/>
    </filter>
  </defs>
</svg>
